name: Plugin Package CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  plugin-package-check:
    name: plugin-package-check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run unit tests
        run: python3 -m unittest tests.test_autoresearch tests.test_browser_damage_calc tests.test_build_plugins

      - name: Rebuild plugin packages
        run: python3 tools/build_plugins.py build

      - name: Refresh release notes
        run: python3 tools/build_plugins.py update-release-notes

      - name: Check generated outputs
        run: python3 tools/build_plugins.py check
